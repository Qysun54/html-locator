<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HTML Locator Demo</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #172033;
      background: #f6f7f9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 18px 28px;
      background: #ffffff;
      border-bottom: 1px solid #dde3ea;
    }

    .brand {
      font-weight: 750;
      letter-spacing: .01em;
    }

    nav {
      display: flex;
      gap: 8px;
    }

    nav a,
    button {
      border: 1px solid #cfd8e3;
      border-radius: 6px;
      background: #fff;
      color: #172033;
      padding: 8px 12px;
      text-decoration: none;
      font: inherit;
      cursor: pointer;
    }

    nav a:first-child,
    .primary {
      background: #185abc;
      border-color: #185abc;
      color: #fff;
    }

    .layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: calc(100vh - 70px);
    }

    aside {
      padding: 20px;
      background: #edf1f5;
      border-right: 1px solid #d8e0e8;
    }

    aside a {
      display: block;
      padding: 10px 12px;
      border-radius: 6px;
      color: #28364a;
      text-decoration: none;
    }

    aside a + a {
      margin-top: 4px;
    }

    aside a:first-child {
      background: #dbe7f7;
      color: #123f76;
      font-weight: 650;
    }

    main {
      padding: 28px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      min-height: 150px;
      padding: 18px;
      background: #fff;
      border: 1px solid #dce3ea;
      border-radius: 8px;
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 16px;
    }

    .metric {
      margin: 0;
      font-size: 32px;
      font-weight: 760;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 18px;
      background: #fff;
      border: 1px solid #dce3ea;
      border-radius: 8px;
      overflow: hidden;
    }

    th,
    td {
      padding: 12px 14px;
      border-bottom: 1px solid #e7ecf1;
      text-align: left;
    }

    @media (max-width: 760px) {
      header,
      .toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      aside {
        border-right: 0;
        border-bottom: 1px solid #d8e0e8;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header data-section="Header-App">
    <div class="brand" data-section="Header-Brand">Atlas Console</div>
    <nav data-section="Nav-Primary" aria-label="Primary">
      <a data-section="Nav-Primary-Dashboard" href="#">Dashboard</a>
      <a data-section="Nav-Primary-Customers" href="#">Customers</a>
      <a data-section="Nav-Primary-Settings" href="#">Settings</a>
    </nav>
  </header>

  <div class="layout" data-section="Layout-AppShell">
    <aside data-section="Sidebar-Workspace">
      <a data-section="Sidebar-Workspace-Overview" href="#">Overview</a>
      <a data-section="Sidebar-Workspace-Reports" href="#">Reports</a>
      <a data-section="Sidebar-Workspace-Automations" href="#">Automations</a>
    </aside>

    <main data-section="Main-Dashboard">
      <div class="toolbar" data-section="Toolbar-Dashboard">
        <h1 data-section="Title-Dashboard">Dashboard</h1>
        <button class="primary" data-section="Action-CreateReport">Create report</button>
      </div>

      <section class="grid" data-section="Grid-Metrics">
        <article class="card" data-section="Card-Revenue">
          <h2>Revenue</h2>
          <p class="metric">$48.2k</p>
          <button>View details</button>
        </article>
        <article class="card" data-section="Card-Activation">
          <h2>Activation</h2>
          <p class="metric">72%</p>
          <button>Improve</button>
        </article>
        <article class="card" data-section="Card-Inbox">
          <h2>Inbox</h2>
          <p class="metric">18</p>
          <button>Open</button>
        </article>
      </section>

      <table data-section="Table-RecentAccounts">
        <thead>
          <tr>
            <th>Account</th>
            <th>Status</th>
            <th>Owner</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Northstar Labs</td>
            <td>Active</td>
            <td>Mina</td>
          </tr>
          <tr>
            <td>Riverline Studio</td>
            <td>Review</td>
            <td>Jon</td>
          </tr>
        </tbody>
      </table>
    </main>
  </div>

  <script src="../locator.js"></script>
</body>
</html>
